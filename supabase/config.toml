# Supabase local dev config — GameStringer Community
# Generato per testare le migration (incluse le sezioni B/C di RLS hardening)
# contro uno stack locale prima del merge su produzione.
# Doc: https://supabase.com/docs/guides/local-development

project_id = "gamestringer-community"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Deve combaciare col Postgres del progetto remoto (17)
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Mailbox di test locale (link di conferma, ecc.)
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
# In locale niente conferma via email: signUp -> sessione autenticata immediata
enable_confirmations = false
