<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon gradients -->
    <linearGradient id="neonBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    
    <linearGradient id="neonGS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="url(#neonBg)"/>
  
  <!-- Outer neon ring - THICK -->
  <rect x="24" y="24" width="464" height="464" rx="76" 
        fill="none" stroke="url(#neonCyan)" stroke-width="12" 
        filter="url(#neonGlow)" opacity="0.9"/>
  
  <!-- GameStringer center mark -->
  <g transform="translate(256, 256)">
    <rect x="-130" y="-92" width="260" height="184" rx="30"
          fill="#020617" opacity="0.78" stroke="url(#neonGS)" stroke-width="4" filter="url(#neonGlow)"/>
    <line x1="0" y1="-72" x2="0" y2="72" stroke="url(#neonPink)" stroke-width="4" opacity="0.9" filter="url(#neonGlow)"/>

    <text x="-65" y="-38" text-anchor="middle" fill="#22d3ee" font-family="Consolas, monospace" font-size="17" font-weight="800" filter="url(#neonGlow)">0101</text>
    <text x="-65" y="-10" text-anchor="middle" fill="#67e8f9" font-family="Consolas, monospace" font-size="17" font-weight="800" filter="url(#neonGlow)">1100</text>
    <text x="-65" y="18" text-anchor="middle" fill="#22d3ee" font-family="Consolas, monospace" font-size="17" font-weight="800" filter="url(#neonGlow)">0011</text>
    <text x="-65" y="48" text-anchor="middle" fill="#38bdf8" font-family="Consolas, monospace" font-size="14" font-weight="800" letter-spacing="2">STR</text>

    <text x="65" y="-42" text-anchor="middle" fill="#f472b6" font-family="Arial, sans-serif" font-size="23" font-weight="900" filter="url(#neonGlow)">あ 中</text>
    <text x="65" y="-6" text-anchor="middle" fill="#c084fc" font-family="Arial, sans-serif" font-size="23" font-weight="900" filter="url(#neonGlow)">EN Я</text>
    <text x="65" y="32" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="20" font-weight="900" filter="url(#neonGlow)">文 Ω</text>
    <path d="M -22,0 L -8,-12 L -8,-5 L 8,-5 L 8,-12 L 22,0 L 8,12 L 8,5 L -8,5 L -8,12 Z"
          fill="url(#neonPink)" filter="url(#neonGlow)" opacity="0.95"/>
  </g>

  <!-- Main GS logo - readable foreground -->
  <g transform="translate(256, 256)" filter="url(#strongGlow)">
    <text x="0" y="43" text-anchor="middle"
          fill="white"
          stroke="url(#neonGS)"
          stroke-width="5"
          paint-order="stroke fill"
          font-family="Arial Black, Impact, sans-serif"
          font-size="142"
          font-weight="900"
          letter-spacing="-8">GS</text>
  </g>
  
  <!-- Small corner glow dots -->
  <circle cx="80" cy="420" r="8" fill="#22d3ee" filter="url(#neonGlow)"/>
  <circle cx="432" cy="80" r="6" fill="#f472b6" filter="url(#neonGlow)"/>
</svg>
