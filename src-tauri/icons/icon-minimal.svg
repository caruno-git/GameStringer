<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#ffffff" opacity="0.03"/>
  </pattern>
  <rect width="512" height="512" rx="120" fill="url(#grid)"/>
  
  <!-- Main G shape -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#primary)" stroke-width="24" opacity="0.3"/>
    
    <!-- G letter shape -->
    <path d="M -80,-80 
             C -30,-130 30,-130 80,-80
             C 120,-40 120,20 80,70
             L 40,70
             L 40,30
             C 60,10 60,-10 40,-30
             C 20,-50 -20,-50 -40,-30
             C -60,-10 -60,40 -40,60
             C -20,80 40,80 60,60
             L 80,100
             C 40,140 -40,140 -80,100
             C -130,50 -130,-30 -80,-80 Z" 
          fill="url(#primary)"/>
    
    <!-- Inner cut (the horizontal bar of G) -->
    <rect x="10" y="-10" width="50" height="20" rx="5" fill="#0f0f23"/>
    
    <!-- Translation arrow accent -->
    <path d="M 60,-100 L 100,-60 L 60,-20" 
          fill="none" stroke="url(#accent)" stroke-width="12" 
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 80,-100 L 80,-20" 
          fill="none" stroke="url(#accent)" stroke-width="12" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Corner accent -->
  <circle cx="430" cy="82" r="30" fill="url(#accent)" opacity="0.2"/>
  <circle cx="430" cy="82" r="15" fill="url(#accent)"/>
</svg>
