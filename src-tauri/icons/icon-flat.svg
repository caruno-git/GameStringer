<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="flatBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    
    <linearGradient id="flatAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  
  <!-- Solid background -->
  <rect width="512" height="512" rx="96" fill="url(#flatBg)"/>
  
  <!-- Flat G shape -->
  <g transform="translate(256, 256)">
    <!-- Main circle -->
    <circle cx="0" cy="0" r="140" fill="#6d28d9"/>
    
    <!-- G cutout -->
    <path d="M -80,-80 
             C -30,-130 30,-130 80,-80
             C 120,-40 120,20 80,70
             L 40,70
             L 40,30
             C 60,10 60,-10 40,-30
             C 20,-50 -20,-50 -40,-30
             C -60,-10 -60,40 -40,60
             C -20,80 40,80 60,60
             L 80,100
             C 40,130 -40,130 -80,100
             C -130,50 -130,-30 -80,-80 Z" 
          fill="white"/>
    
    <!-- Inner bar (cutout) -->
    <rect x="25" y="-12" width="45" height="24" rx="6" fill="#6d28d9"/>
    
    <!-- Flat translation icon overlay -->
    <g transform="translate(80, -80)">
      <rect x="-30" y="-30" width="60" height="60" rx="16" fill="url(#flatAccent)"/>
      <path d="M -12,5 L 0,15 L 12,5" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M -12,-5 L 0,5 L 12,-5" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Subtle pattern dots -->
  <circle cx="80" cy="100" r="8" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="432" cy="412" r="12" fill="#22d3ee" opacity="0.3"/>
  <circle cx="120" cy="400" r="6" fill="#f472b6" opacity="0.4"/>
</svg>
