<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    
    <linearGradient id="surface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <filter id="shadow3d" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <filter id="glow3d" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg3d)"/>
  
  <!-- 3D Gamepad Shape -->
  <g transform="translate(256, 256)" filter="url(#shadow3d)">
    <!-- Main body with 3D effect -->
    <path d="M -140,0 
             C -140,-80 -100,-120 0,-120 
             C 100,-120 140,-80 140,0 
             C 140,100 100,140 0,140 
             C -100,140 -140,100 -140,0 Z" 
          fill="url(#surface)"/>
    
    <!-- 3D depth/highlight -->
    <path d="M -130,-10 
             C -130,-75 -95,-110 0,-110 
             C 95,-110 130,-75 130,-10 
             C 130,5 125,15 115,20
             C 100,-50 -100,-50 -115,20
             C -125,15 -130,5 -130,-10 Z" 
          fill="url(#highlight)"/>
    
    <!-- D-Pad -->
    <g transform="translate(-80, 20)">
      <rect x="-35" y="-10" width="70" height="20" rx="5" fill="#1e1b4b"/>
      <rect x="-10" y="-35" width="20" height="70" rx="5" fill="#1e1b4b"/>
      <!-- D-pad center -->
      <circle cx="0" cy="0" r="12" fill="#312e81"/>
    </g>
    
    <!-- Action Buttons -->
    <g transform="translate(80, 20)">
      <!-- Triangle/Y -->
      <circle cx="0" cy="-40" r="18" fill="#fbbf24"/>
      <path d="M 0,-48 L 6,-36 L -6,-36 Z" fill="#1e1b4b"/>
      
      <!-- Circle/B -->
      <circle cx="35" cy="-10" r="18" fill="#f472b6"/>
      <circle cx="35" cy="-10" r="8" fill="#1e1b4b"/>
      
      <!-- Square/X -->
      <circle cx="-35" cy="-10" r="18" fill="#22d3ee"/>
      <rect x="-41" y="-16" width="12" height="12" rx="2" fill="#1e1b4b"/>
      
      <!-- X/A -->
      <circle cx="0" cy="30" r="18" fill="#a3e635"/>
      <path d="M -6,24 L 6,36 M 6,24 L -6,36" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Select/Start buttons -->
    <rect x="-40" y="70" width="25" height="8" rx="4" fill="#312e81"/>
    <rect x="15" y="70" width="25" height="8" rx="4" fill="#312e81"/>
    
    <!-- Translation arrows floating -->
    <g transform="translate(0, -160)">
      <path d="M -30,0 L 0,-25 L 30,0" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow3d)"/>
      <path d="M -30,-15 L 0,-40 L 30,-15" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow3d)" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Gloss effect -->
  <ellipse cx="256" cy="150" rx="80" ry="30" fill="white" opacity="0.1"/>
</svg>
