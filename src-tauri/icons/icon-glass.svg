<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.95"/>
    </linearGradient>
    
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
    </linearGradient>
    
    <linearGradient id="glassInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(139,92,246,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(34,211,238,0.3)"/>
    </linearGradient>
  </defs>
  
  <!-- Background with glass effect -->
  <rect width="512" height="512" rx="112" fill="url(#glassBg)"/>
  
  <!-- Glass border -->
  <rect x="8" y="8" width="496" height="496" rx="104" 
        fill="none" stroke="url(#glassBorder)" stroke-width="3"/>
  
  <!-- Inner glass panel -->
  <rect x="32" y="32" width="448" height="448" rx="88" 
        fill="url(#glassInner)" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
  
  <!-- Glass reflection -->
  <ellipse cx="256" cy="120" rx="180" ry="60" fill="url(#glassReflect)"/>
  
  <!-- Center icon - stylized controller -->
  <g transform="translate(256, 256)">
    <!-- Controller body -->
    <path d="M -100,0 
             C -100,-60 -60,-90 0,-90 
             C 60,-90 100,-60 100,0 
             C 100,70 60,100 0,100 
             C -60,100 -100,70 -100,0 Z" 
          fill="rgba(139,92,246,0.4)" stroke="rgba(139,92,246,0.6)" stroke-width="2"/>
    
    <!-- Screen area -->
    <rect x="-40" y="-40" width="80" height="50" rx="8" 
          fill="rgba(15,23,42,0.8)" stroke="rgba(34,211,238,0.5)" stroke-width="2"/>
    
    <!-- Text lines -->
    <line x1="-30" y1="-25" x2="30" y2="-25" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="-30" y1="-15" x2="15" y2="-15" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-30" y1="-5" x2="20" y2="-5" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Translation arrows on screen -->
    <path d="M 50,-20 L 70,-30 L 70,-10 Z" fill="#22d3ee" opacity="0.9"/>
    <path d="M 50,0 L 70,-10 L 70,10 Z" fill="#8b5cf6" opacity="0.7"/>
    
    <!-- D-pad -->
    <g transform="translate(-60, 30)">
      <rect x="-8" y="-25" width="16" height="50" rx="4" fill="rgba(255,255,255,0.2)"/>
      <rect x="-25" y="-8" width="50" height="16" rx="4" fill="rgba(255,255,255,0.2)"/>
    </g>
    
    <!-- Action buttons -->
    <circle cx="60" cy="40" r="12" fill="rgba(244,114,182,0.6)"/>
    <circle cx="80" cy="20" r="10" fill="rgba(163,230,53,0.6)"/>
  </g>
  
  <!-- Bottom glass shine -->
  <path d="M 100,420 Q 256,460 412,420" 
        fill="none" stroke="white" stroke-width="2" stroke-opacity="0.1" stroke-linecap="round"/>
</svg>
