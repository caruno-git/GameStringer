name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Frontend quality checks ─────────────────────────────────
  frontend-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Il lockfile è generato da npm 11 in locale: npm 10 (bundled con
      # Node 20) valida i peer di @swc/* in modo diverso e npm ci fallisce
      # con "Missing @swc/helpers". Allineare la versione di npm.
      - name: Align npm version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "file:./dev.db"

      # Gate BLOCCANTE dal 2026-06-11 (baseline portata a 0 errori).
      # Niente pipe a tail: in pwsh maschererebbe l'exit code di tsc.
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Gate BLOCCANTE dal 2026-06-11 (78 errori bonificati a 0; i warning
      # non bloccano — next lint esce 0 con soli warning).
      - name: ESLint
        run: npm run lint

      # Non bloccante: OOM risolto l'11/06/2026 (mock instabile in
      # notification-center.test → render-loop infinito). Baseline reale:
      # 322 passed / 78 failed su 400 (34 file, ~14s). Bonificare i rossi
      # e poi rimuovere continue-on-error.
      - name: Unit tests
        run: npm run test:run
        continue-on-error: true

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ── Rust backend checks ─────────────────────────────────────
  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create frontend dist stub
        run: mkdir out && echo "<html></html>" > out/index.html

      - name: Cargo check (Windows)
        working-directory: src-tauri
        run: cargo check --verbose

  check-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create frontend dist stub
        run: mkdir -p out && echo '<html></html>' > out/index.html

      - name: Cargo check (Linux)
        working-directory: src-tauri
        run: cargo check --verbose
