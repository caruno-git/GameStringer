name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Frontend quality checks ─────────────────────────────────
  frontend-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Il lockfile è generato da npm 11 in locale: npm 10 (bundled con
      # Node 20) valida i peer di @swc/* in modo diverso e npm ci fallisce
      # con "Missing @swc/helpers". Allineare la versione di npm.
      - name: Align npm version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "file:./dev.db"

      # Gate BLOCCANTE dal 2026-06-11 (baseline portata a 0 errori).
      # Niente pipe a tail: in pwsh maschererebbe l'exit code di tsc.
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Gate BLOCCANTE dal 2026-06-11 (78 errori bonificati a 0; i warning
      # non bloccano — next lint esce 0 con soli warning).
      - name: ESLint
        run: npm run lint

      # Gate anti testo hardcoded (ratchet vs scripts/.i18n-baseline.json).
      # Fallisce se il numero di stringhe hardcoded user-facing AUMENTA →
      # ogni nuova stringa UI deve passare da t()/i18n. Abbassare la baseline
      # man mano che si bonifica: npm run i18n:check:update.
      - name: i18n no-hardcoded guard
        run: npm run i18n:check

      # Gate BLOCCANTE dal 2026-06-11 (suite bonificata: 464 passed,
      # 0 failed, 37 skip documentati — vedi i TODO nei singoli file).
      - name: Unit tests
        run: npm run test:run

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ── Rust backend checks ─────────────────────────────────────
  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create frontend dist stub
        run: mkdir out && echo "<html></html>" > out/index.html

      - name: Cargo check (Windows)
        working-directory: src-tauri
        run: cargo check --verbose

      # Suite Rust completa. I due test di isolamento prima flaky in parallelo sono
      # stati isolati (2026-06-14): helper notifications → tempfile::tempdir() e
      # rimosso il save detached in load_profile che faceva race con i save espliciti.
      # Verde in parallelo: 1086 passed, 0 failed, 42 #[ignore]. Vedi docs/RUST-TEST-TRIAGE.md.
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --verbose

  check-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create frontend dist stub
        run: mkdir -p out && echo '<html></html>' > out/index.html

      - name: Cargo check (Linux)
        working-directory: src-tauri
        run: cargo check --verbose
