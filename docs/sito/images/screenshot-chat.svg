<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0" y1="0" x2="0" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)" rx="12"/>
  <!-- Top bar -->
  <rect width="1200" height="48" fill="#1e293b" rx="12"/>
  <rect y="12" width="1200" height="36" fill="#1e293b"/>
  <circle cx="24" cy="24" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="44" cy="24" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="64" cy="24" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="600" y="30" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">GameStringer — Community Chat</text>
  
  <!-- Left sidebar - Rooms -->
  <rect x="0" y="48" width="250" height="702" fill="url(#sidebar)"/>
  <rect x="250" y="48" width="1" height="702" fill="#334155"/>
  
  <!-- Sidebar header -->
  <text x="20" y="82" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">💬 Chat Rooms</text>
  
  <!-- Room items -->
  <rect x="12" y="96" width="226" height="40" rx="8" fill="rgba(14,165,233,0.15)"/>
  <text x="24" y="120" fill="#7dd3fc" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600"># Generale</text>
  <circle cx="222" cy="116" r="4" fill="#22c55e"/>
  
  <rect x="12" y="144" width="226" height="40" rx="8" fill="transparent"/>
  <text x="24" y="168" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12"># Traduzioni</text>
  
  <rect x="12" y="192" width="226" height="40" rx="8" fill="transparent"/>
  <text x="24" y="216" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12"># Feedback &amp; Bug</text>
  
  <rect x="12" y="240" width="226" height="40" rx="8" fill="transparent"/>
  <text x="24" y="264" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="12"># Annunci</text>
  
  <!-- Online users section -->
  <text x="20" y="320" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">ONLINE — 7</text>
  
  <circle cx="28" cy="344" r="8" fill="#3b82f6"/>
  <text x="44" y="348" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="11">rouges78</text>
  <circle cx="222" cy="344" r="4" fill="#22c55e"/>
  
  <circle cx="28" cy="368" r="8" fill="#8b5cf6"/>
  <text x="44" y="372" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="11">translator_jp</text>
  <circle cx="222" cy="368" r="4" fill="#22c55e"/>
  
  <circle cx="28" cy="392" r="8" fill="#f59e0b"/>
  <text x="44" y="396" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="11">modder_unity</text>
  <circle cx="222" cy="392" r="4" fill="#22c55e"/>
  
  <circle cx="28" cy="416" r="8" fill="#22c55e"/>
  <text x="44" y="420" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="11">vn_fan_2026</text>
  <circle cx="222" cy="416" r="4" fill="#22c55e"/>

  <!-- Main chat area -->
  <rect x="250" y="48" width="950" height="702" fill="transparent"/>
  
  <!-- Chat header -->
  <rect x="251" y="48" width="949" height="50" fill="#1e293b"/>
  <text x="275" y="78" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700"># Generale</text>
  <text x="400" y="78" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="11">Chat libera della community GameStringer</text>
  
  <!-- Messages -->
  <!-- Message 1 -->
  <circle cx="285" cy="130" r="16" fill="#3b82f6"/>
  <text x="285" y="135" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">R</text>
  <text x="310" y="125" fill="#7dd3fc" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">rouges78</text>
  <text x="390" y="125" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">18:02</text>
  <text x="310" y="143" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">Ciao a tutti! La v1.5.0 con la chat è appena uscita 🎉</text>
  
  <!-- Message 2 -->
  <circle cx="285" cy="190" r="16" fill="#8b5cf6"/>
  <text x="285" y="195" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">T</text>
  <text x="310" y="185" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">translator_jp</text>
  <text x="410" y="185" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">18:03</text>
  <text x="310" y="203" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">Fantastico! Sto traducendo un VN con Ren'Py, la TM funziona benissimo 👍</text>
  
  <!-- Message 3 -->
  <circle cx="285" cy="250" r="16" fill="#f59e0b"/>
  <text x="285" y="255" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">M</text>
  <text x="310" y="245" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">modder_unity</text>
  <text x="420" y="245" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">18:05</text>
  <text x="310" y="263" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">Qualcuno ha provato il BepInEx auto-install? Funziona alla grande su Hollow Knight!</text>
  
  <!-- Message 4 -->
  <circle cx="285" cy="310" r="16" fill="#22c55e"/>
  <text x="285" y="315" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">V</text>
  <text x="310" y="305" fill="#4ade80" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">vn_fan_2026</text>
  <text x="410" y="305" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">18:07</text>
  <text x="310" y="323" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">Ho appena finito la traduzione di Danganronpa V3! 35k stringhe 🔥</text>
  
  <!-- Message 5 -->
  <circle cx="285" cy="370" r="16" fill="#3b82f6"/>
  <text x="285" y="375" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">R</text>
  <text x="310" y="365" fill="#7dd3fc" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">rouges78</text>
  <text x="390" y="365" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">18:08</text>
  <text x="310" y="383" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">@vn_fan_2026 Wow! Puoi condividerla nella sezione Community Hub? 🙌</text>
  
  <!-- Message 6 -->
  <circle cx="285" cy="430" r="16" fill="#ec4899"/>
  <text x="285" y="435" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">L</text>
  <text x="310" y="425" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">luna_rpg</text>
  <text x="400" y="425" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">18:10</text>
  <text x="310" y="443" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="12">L'auto-glossario AI mi ha risparmiato ore di lavoro su RPG Maker MZ 💜</text>

  <!-- Message input -->
  <rect x="265" y="700" width="920" height="38" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="285" y="724" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="12">Scrivi un messaggio...</text>
  <rect x="1130" y="706" width="44" height="26" rx="6" fill="url(#accent)"/>
  <text x="1152" y="723" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Invia</text>
  
  <!-- Typing indicator -->
  <text x="275" y="690" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10" font-style="italic">translator_jp sta scrivendo...</text>
</svg>
