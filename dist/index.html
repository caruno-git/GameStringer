<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStringer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 50% 38%, #241047 0%, #140a24 60%, #0c0717 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container { max-width: 400px; padding: 2rem; }
        .logo {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin: 0 auto 1.1rem;
            display: block;
            box-shadow: 0 0 36px rgba(177,77,255,0.45), 0 0 64px rgba(77,141,255,0.25);
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #ff4d9e, #b14dff, #4d8dff, #ff4d9e);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 4s linear infinite;
        }
        p { margin: 0 0 1.5rem; opacity: 0.7; font-size: 0.9rem; }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top: 2px solid #b14dff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    </style>
</head>
